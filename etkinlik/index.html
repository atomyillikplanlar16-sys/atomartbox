<style>
:root{
  --paper:#FDFBF7;
  --card:#FFFFFF;
  --ink:#1C1B19;
  --ink-soft:#6B6458;
  --kraft:#C9A06B;
  --kraft-deep:#9A7748;
  --line:#ECE4D6;
  --line-strong:#E0D7C5;
  --pop:#F4A52B;
  --pop-soft:#FCEFD7;
  --danger:#D9544D;
  --radius:18px;
  --shadow:0 18px 50px -28px rgba(60,45,20,.45);
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  font-family:"Nunito Sans",system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:980px;margin:0 auto;padding:26px 18px 70px;}

/* ---------- HERO ---------- */
.hero{
  position:relative;
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
  min-height:300px;
}
.hero__img{
  position:absolute;top:0;right:0;
  width:56%;height:100%;
  object-fit:cover;object-position:left center;
  z-index:0;
}
.hero__content{
  position:relative;z-index:2;
  width:62%;max-width:560px;
  padding:38px 32px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:14px;
  min-height:300px;
}
.hero__logo{width:108px;height:auto;display:block;}
.eyebrow{
  font-family:"Poppins",sans-serif;
  font-weight:600;
  letter-spacing:.16em;
  text-transform:uppercase;
  font-size:12px;
  color:var(--kraft-deep);
}
.hero h1{
  font-family:"Poppins",sans-serif;
  font-weight:700;
  font-size:clamp(28px,5vw,42px);
  line-height:1.02;
  margin:0;
  letter-spacing:-.01em;
}
.hero p{margin:0;color:var(--ink-soft);font-size:15px;max-width:34ch;}
/* fade so text stays readable where image meets content on small screens */
.hero__fade{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,#fff 42%,rgba(255,255,255,0) 66%);
}

/* floating doodle stars */
.spark{position:absolute;z-index:3;color:var(--pop);opacity:.9;animation:bob 6s ease-in-out infinite;}
.spark.s1{top:18px;left:24px;width:22px;animation-delay:.0s;}
.spark.s2{bottom:26px;left:46%;width:16px;color:var(--kraft);animation-delay:1.4s;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-7px) rotate(6deg);}}

/* ---------- FORM CARD ---------- */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-top:22px;
  padding:30px;
}
.section-label{
  display:flex;align-items:center;gap:9px;
  font-family:"Poppins",sans-serif;font-weight:600;
  font-size:13px;letter-spacing:.04em;text-transform:uppercase;
  color:var(--ink);margin:0 0 14px;
}
.section-label svg{width:18px;height:18px;color:var(--pop);}
.section-label + .section-label{margin-top:8px;}

label.field{display:block;}
.field-cap{
  display:block;font-size:12px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;
}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

input,textarea{
  width:100%;
  font-family:inherit;font-size:15px;color:var(--ink);
  background:#fff;
  border:1.5px solid var(--line-strong);
  border-radius:12px;
  padding:12px 13px;
  transition:border-color .15s, box-shadow .15s, background .15s;
}
input::placeholder,textarea::placeholder{color:#B6AE9E;}
input:hover,textarea:hover{border-color:var(--kraft);}
input:focus,textarea:focus{
  outline:none;
  border-color:var(--pop);
  box-shadow:0 0 0 4px var(--pop-soft);
  background:#fff;
}
textarea{min-height:104px;resize:vertical;}

.divider{height:1px;background:var(--line);border:0;margin:26px 0;}

/* ---------- TABLE ---------- */
.tbl{width:100%;border-collapse:separate;border-spacing:0;}
.tbl thead th{
  text-align:left;
  font-family:"Poppins",sans-serif;font-weight:600;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:#fff;background:var(--ink);
  padding:12px 12px;
}
.tbl thead th:first-child{border-radius:10px 0 0 10px;}
.tbl thead th:last-child{border-radius:0 10px 10px 0;}
.tbl tbody td{padding:8px 6px;vertical-align:middle;}
.tbl tbody tr + tr td{border-top:1px dashed var(--line-strong);}
.tbl input{padding:10px 11px;font-size:14px;}
.col-act{width:36%;}.col-date{width:19%;}.col-num{width:14%;}.col-x{width:50px;}

.btn-del{
  display:inline-grid;place-items:center;
  width:34px;height:34px;border-radius:9px;
  border:1.5px solid var(--line-strong);background:#fff;color:var(--ink-soft);
  cursor:pointer;transition:.15s;
}
.btn-del:hover{border-color:var(--danger);color:var(--danger);background:#FCEDEC;}
.btn-del svg{width:16px;height:16px;}

.btn-add{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:16px;
  font-family:"Poppins",sans-serif;font-weight:600;font-size:14px;
  color:var(--kraft-deep);background:#fff;
  border:1.5px dashed var(--kraft);border-radius:12px;
  padding:11px 20px;cursor:pointer;transition:.15s;
}
.btn-add:hover{background:var(--pop-soft);border-color:var(--pop);color:var(--ink);}
.btn-add svg{width:18px;height:18px;}

/* ---------- SUBMIT ---------- */
.btn-send{
  width:100%;margin-top:10px;
  display:inline-flex;align-items:center;justify-content:center;gap:11px;
  font-family:"Poppins",sans-serif;font-weight:700;font-size:17px;letter-spacing:.01em;
  color:var(--ink);background:var(--pop);
  border:none;border-radius:14px;padding:17px;
  cursor:pointer;transition:transform .15s, box-shadow .15s, background .15s;
  box-shadow:0 12px 26px -12px rgba(244,165,43,.85);
}
.btn-send:hover{transform:translateY(-2px);background:#FAB342;box-shadow:0 16px 30px -12px rgba(244,165,43,.9);}
.btn-send:active{transform:translateY(0);}
.btn-send svg{width:21px;height:21px;transition:transform .25s;}
.btn-send:hover svg{transform:translate(4px,-4px) rotate(8deg);}
.btn-send.sending svg{animation:fly .7s ease-in forwards;}
@keyframes fly{to{transform:translate(46px,-46px) rotate(18deg);opacity:0;}}

.foot{text-align:center;margin-top:22px;font-size:13px;color:var(--ink-soft);}
.foot b{color:var(--kraft-deep);font-weight:700;}

/* toast */
.toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(120%);
  background:var(--ink);color:#fff;font-family:"Poppins",sans-serif;font-weight:500;
  padding:14px 22px;border-radius:14px;box-shadow:0 14px 34px -10px rgba(0,0,0,.5);
  z-index:50;transition:transform .35s cubic-bezier(.2,.8,.2,1);display:flex;gap:10px;align-items:center;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast svg{width:20px;height:20px;color:var(--pop);}

/* ---------- RESPONSIVE ---------- */
@media (max-width:760px){
  .hero{min-height:0;}
  .hero__img{position:static;width:100%;height:180px;object-position:right center;display:block;}
  .hero__content{width:100%;max-width:none;min-height:0;padding:24px 22px;}
  .hero__fade{display:none;}
  .card{padding:22px 18px;}
  .grid3{grid-template-columns:1fr;gap:13px;}

  .tbl thead{display:none;}
  .tbl,.tbl tbody,.tbl tr,.tbl td{display:block;width:100%;}
  .tbl tbody tr{
    border:1.5px solid var(--line-strong);border-radius:14px;
    padding:12px;margin-bottom:14px;position:relative;
  }
  .tbl tbody tr + tr td{border-top:0;}
  .tbl tbody td{padding:6px 0;}
  .tbl tbody td::before{
    content:attr(data-label);display:block;
    font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:4px;
  }
  .tbl td.col-x{position:absolute;top:8px;right:8px;padding:0;width:auto;}
  .tbl td.col-x::before{display:none;}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;}
}
:focus-visible{outline:2px solid var(--pop);outline-offset:2px;}

      {text:String(i+1), alignment:"center", style:"td", color:KRAFT, bold:true},
      {text:e.etkinlik||"—", style:"td"},
      {text:trDate(e.baslangic), alignment:"center", style:"td"},
      {text:trDate(e.bitis), alignment:"center", style:"td"},
      {text:e.ogrenci?String(e.ogrenci):"—", alignment:"center", style:"td"}
    ]);
  });

  function infoCell(label,val){
    return {stack:[{text:label.toUpperCase(), style:"infoLabel"},{text:val||"—", style:"infoVal"}]};
  }

  return {
    pageSize:"A4",
    pageMargins:[48,135,48,64],
    defaultStyle:{font:"Roboto", color:INK, fontSize:10, lineHeight:1.25},
    info:{title:"ATOM ART BOX - Etkinlik Plani"},
    header:function(){
      return {margin:[48,30,48,0], columns:[
        {image:LOGO_PDF, width:62},
        {width:"*", margin:[14,8,0,0], stack:[
          {text:"ETKİNLİK PLANI", style:"hTitle"},
          {text:"doğa · sanat · eğitim", style:"hSub"}
        ]},
        {width:"auto", margin:[0,10,0,0], stack:[
          {text:"TARİH", style:"hMetaLabel", alignment:"right"},
          {text:bugunTR(), style:"hMetaVal", alignment:"right"}
        ]}
      ]};
    },
    footer:function(cur,total){
      return {margin:[48,16,48,0], columns:[
        {text:"www.atomartbox.com.tr", color:KRAFT, fontSize:8.5, bold:true},
        {text:"ATOM ART BOX · Etkinlik Planı", color:MUTE, fontSize:8.5, alignment:"center"},
        {text:cur+" / "+total, color:MUTE, fontSize:8.5, alignment:"right"}
      ]};
    },
    content:[
      {canvas:[{type:"rect", x:0, y:0, w:515, h:3, color:POP, r:1.5}], margin:[0,0,0,18]},

      {text:"GENEL BİLGİLER", style:"sectionLabel"},
      {margin:[0,8,0,0],
       table:{widths:["*","*","*"], body:[[ infoCell("Hazırlayan",d.hazirlayan), infoCell("Okul Adı",d.okul), infoCell("Sınıf Düzeyi",d.sinif) ]]},
       layout:{fillColor:function(){return SOFT;}, hLineWidth:function(){return 0;}, vLineWidth:function(){return 0;}, paddingLeft:function(){return 14;}, paddingRight:function(){return 14;}, paddingTop:function(){return 11;}, paddingBottom:function(){return 11;}}
      },

      {text:"ETKİNLİK TAKVİMİ", style:"sectionLabel", margin:[0,26,0,8]},
      {table:{headerRows:1, widths:[22,"*",70,70,52], body:tableBody},
       layout:{hLineWidth:function(i){return i===1?0:0.8;}, hLineColor:function(){return LINE;}, vLineWidth:function(){return 0;},
               fillColor:function(r){return r===0?INK:(r%2===0?SOFT:null);},
               paddingLeft:function(){return 9;}, paddingRight:function(){return 9;}, paddingTop:function(){return 9;}, paddingBottom:function(){return 9;}}
      },
      {margin:[0,10,0,0], columns:[
        {text:"", width:"*"},
        {width:"auto",
         table:{widths:["auto","auto"], body:[[ {text:"TOPLAM ÖĞRENCİ", style:"sumLabel"}, {text:String(toplam), style:"sumVal"} ]]},
         layout:{hLineWidth:function(){return 0;}, vLineWidth:function(){return 0;}, paddingLeft:function(){return 10;}, paddingRight:function(){return 10;}, paddingTop:function(){return 6;}, paddingBottom:function(){return 6;}, fillColor:function(){return "#FCEFD7";}}
        }
      ]},

      {text:"NOTLAR", style:"sectionLabel", margin:[0,26,0,8]},
      {table:{widths:["*"], body:[[ {text:(d.notlar&&d.notlar.trim())?d.notlar:"—", style:"notes"} ]]},
       layout:{hLineWidth:function(){return 1;}, vLineWidth:function(){return 1;}, hLineColor:function(){return LINE;}, vLineColor:function(){return LINE;}, paddingLeft:function(){return 14;}, paddingRight:function(){return 14;}, paddingTop:function(){return 12;}, paddingBottom:function(){return 12;}}
      }
    ],
    styles:{
      hTitle:{fontSize:17, bold:true, color:INK, characterSpacing:0.5},
      hSub:{fontSize:9, color:KRAFT, bold:true, margin:[0,2,0,0], characterSpacing:1},
      hMetaLabel:{fontSize:7.5, color:MUTE, bold:true, characterSpacing:1},
      hMetaVal:{fontSize:10, color:INK, bold:true, margin:[0,2,0,0]},
      sectionLabel:{fontSize:11, bold:true, color:INK, characterSpacing:1},
      infoLabel:{fontSize:7.5, color:MUTE, bold:true, characterSpacing:1, margin:[0,0,0,4]},
      infoVal:{fontSize:12, color:INK, bold:true},
      th:{fontSize:8.5, bold:true, color:"#FFFFFF", characterSpacing:0.8},
      td:{fontSize:10, color:INK},
      sumLabel:{fontSize:8.5, bold:true, color:KRAFT, characterSpacing:0.8, margin:[0,2,0,0]},
      sumVal:{fontSize:14, bold:true, color:INK},
      notes:{fontSize:10.5, color:"#332F28", lineHeight:1.4}
    }
  };
}

function satirEkle(){
  var tbody=document.getElementById("etkinlikTablosu");
  var tr=document.createElement("tr");
  tr.innerHTML=
    '<td class="col-act" data-label="Etkinlik"><input type="text" class="row-etkinlik" placeholder="Etkinlik adı"></td>'+
    '<td class="col-date" data-label="Başlangıç"><input type="date" class="row-baslangic"></td>'+
    '<td class="col-date" data-label="Bitiş"><input type="date" class="row-bitis"></td>'+
    '<td class="col-num" data-label="Öğrenci"><input type="number" class="row-ogrenci" min="0" placeholder="0"></td>'+
    '<td class="col-x"><button type="button" class="btn-del" aria-label="Satırı sil" onclick="this.closest(\'tr\').remove()">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>'+
    '</button></td>';
  tbody.appendChild(tr);
  tr.querySelector(".row-etkinlik").focus();
}

function showToast(msg){
  var t=document.getElementById("toast");
  document.getElementById("toastMsg").textContent=msg;
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3200);
}

function gonder(){
  var list=[];
  document.querySelectorAll("#etkinlikTablosu tr").forEach(function(r){
    var node=r.querySelector(".row-etkinlik");
    var etk=node? node.value.trim() : "";
    if(etk){
      list.push({
        etkinlik:etk,
        baslangic:r.querySelector(".row-baslangic").value,
        bitis:r.querySelector(".row-bitis").value,
        ogrenci:r.querySelector(".row-ogrenci").value
      });
    }
  });

  if(list.length===0){ showToast("Lütfen en az bir etkinlik ekle."); return; }

  var d={
    hazirlayan:document.getElementById("hazirlayan").value,
    okul:document.getElementById("okul").value,
    sinif:document.getElementById("sinif").value,
    notlar:document.getElementById("notlar").value,
    liste:list
  };

  if(typeof pdfMake==="undefined"){
    showToast("PDF aracı yüklenemedi. İnternet bağlantını kontrol et.");
    return;
  }

  var btn=document.getElementById("sendBtn");
  btn.classList.add("sending");

  var dosyaAdi="ATOM-ART-BOX-Etkinlik-Plani-"+dosyaTarih()+".pdf";

  try{
    // PDF önizleme için yeni sekmede aç (görüntüleyiciden indirilebilir/yazdırılabilir)
    pdfMake.createPdf(buildPlanDoc(d)).open();

    // Kısa bir gecikmeyle Gmail compose ekranını aç, kullanıcı PDF'i indirip elle ekleyebilsin
    setTimeout(function(){
      gmailCompose(d);
    }, 600);

    showToast("PDF açıldı. İndirip Gmail penceresine ekleyebilirsin.");
  }catch(err){
    console.error(err);
    showToast("PDF oluşturulurken bir sorun oldu.");
  }
  setTimeout(function(){ btn.classList.remove("sending"); },900);

  // İsteğe bağlı: veriler Google Apps Script tarafına da kaydedilsin (kuruluysa)
  if(typeof google!=="undefined" && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(function(){})
      .withFailureHandler(function(){})
      .planiKaydet(d);
  }
}

function gmailCompose(d){
  var etkinlikOzet = (d.liste || []).map(function(e, i){
    return (i+1)+". "+(e.etkinlik||"—")+" ("+trDate(e.baslangic)+" - "+trDate(e.bitis)+", "+(e.ogrenci||"0")+" öğrenci)";
  }).join("\n");

  var konu = "Etkinlik Planı - " + (d.okul || "Okul") + " - " + bugunTR();

  var govde =
    "Hazırlayan: " + (d.hazirlayan || "—") + "\n" +
    "Okul: " + (d.okul || "—") + "\n" +
    "Sınıf Düzeyi: " + (d.sinif || "—") + "\n" +
    "Tarih: " + bugunTR() + "\n\n" +
    "Etkinlikler:\n" + etkinlikOzet + "\n\n" +
    "Notlar:\n" + (d.notlar && d.notlar.trim() ? d.notlar : "—") + "\n\n" +
    "(Lütfen az önce indirilen/önizlenen PDF dosyasını bu maile ek olarak ekleyin.)";

  var url = "https://mail.google.com/mail/?view=cm&fs=1"
    + "&to=" + encodeURIComponent(HEDEF_EMAIL)
    + "&su=" + encodeURIComponent(konu)
    + "&body=" + encodeURIComponent(govde);

  window.open(url, "_blank");
}
