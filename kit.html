  /* sol tarafa hizalı içerik tabakası – çocuğun üstünü kapatmaz */
  .stage{
    min-height:100dvh;
    display:flex;
    align-items:center;
    padding:clamp(16px,3vw,48px);
  }
  .panel{
    width:min(640px,100%);
    background:var(--scrim);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
    border:2.5px solid var(--line);
    border-radius:26px;
    padding:clamp(20px,3.2vw,40px);
    box-shadow:7px 9px 0 rgba(28,27,26,.9);
    position:relative;
  }
  /* el çizimi köşe iğnesi hissi */
  .panel::before{
    content:"";position:absolute;top:-2.5px;left:-2.5px;right:-2.5px;bottom:-2.5px;
    border-radius:26px;border:2.5px dashed rgba(28,27,26,.18);
    transform:rotate(-.4deg);pointer-events:none;
  }

  /* ---- brand ---- */
  .brand{display:flex;align-items:center;gap:16px;margin-bottom:10px}
  .brand .mark{
    height:clamp(88px,13vw,116px);width:auto;flex:0 0 auto;display:block;
    background:#fff;border-radius:12px;
  }
  .brand .name{font-family:"Fredoka",sans-serif;font-weight:700;letter-spacing:.5px;line-height:.95}
  .brand .name b{display:block;font-size:clamp(34px,6vw,50px);font-weight:400}
  .brand .name span{font-size:13px;color:var(--ink-soft);letter-spacing:2.5px}

  /* ---- views ---- */
  .view{display:none;animation:rise .45s cubic-bezier(.2,.8,.2,1) both}
  .view.active{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* HOME */
  .hero h1{
    font-family:"Fredoka",sans-serif;font-weight:700;
    font-size:clamp(34px,6.4vw,60px);line-height:1.04;margin:18px 0 18px;
  }
  .hero h1 .pop{color:var(--c-bizkimiz)}
  .hero p{font-family:"Nunito Sans",sans-serif;font-size:clamp(15px,2.2vw,18px);color:var(--ink-soft);max-width:42ch;margin:0 0 26px}
  .cta{
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:19px;cursor:pointer;
    border:2.5px solid var(--ink);background:#F07A1B;color:#fff;
    padding:14px 26px;border-radius:16px;box-shadow:4px 5px 0 var(--ink);
    transition:transform .12s,box-shadow .12s;display:inline-flex;align-items:center;gap:10px;
  }
  .cta:hover{transform:translate(-2px,-2px);box-shadow:6px 7px 0 var(--ink)}
  .cta:active{transform:translate(2px,2px);box-shadow:1px 2px 0 var(--ink)}

  /* breadcrumb / back */
  .top-row{display:flex;align-items:center;gap:12px;margin:14px 0 18px;flex-wrap:wrap}
  .back{
    border:2.5px solid var(--ink);background:#fff;cursor:pointer;border-radius:12px;
    padding:8px 14px;font-family:"Fredoka",sans-serif;font-weight:600;font-size:15px;
    display:inline-flex;align-items:center;gap:7px;box-shadow:3px 3px 0 var(--ink);
    transition:transform .12s,box-shadow .12s;
  }
  .back:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
  .back:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .eyebrow{font-family:"Fredoka",sans-serif;font-weight:700;font-size:clamp(22px,3.6vw,30px)}

  /* THEMES grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .theme-btn{
    text-align:left;cursor:pointer;border:2.5px solid var(--ink);border-radius:18px;
    background:#fff;padding:16px 16px 14px;color:var(--ink);
    box-shadow:5px 6px 0 var(--ink);transition:transform .14s,box-shadow .14s;
    display:flex;flex-direction:column;gap:10px;min-height:118px;font-family:"Fredoka",sans-serif;
  }
  .theme-btn:nth-child(odd){transform:rotate(-1deg)}
  .theme-btn:nth-child(even){transform:rotate(1deg)}
  .theme-btn:hover{transform:rotate(0deg) translate(-2px,-3px);box-shadow:8px 10px 0 var(--ink)}
  .theme-btn:active{transform:rotate(0) translate(2px,2px);box-shadow:2px 3px 0 var(--ink)}
  .theme-btn .chip{
    width:40px;height:40px;border-radius:50%;border:2.5px solid var(--ink);
    display:grid;place-items:center;flex:0 0 auto;color:#fff;
    box-shadow:2px 3px 0 var(--ink);transition:transform .2s;
  }
  .theme-btn .chip svg{width:22px;height:22px}
  .theme-btn:hover .chip{transform:rotate(-8deg) scale(1.06)}
  .theme-btn .t{font-weight:600;font-size:clamp(15px,2.2vw,18px);line-height:1.2;overflow-wrap:normal;word-break:keep-all}
  .theme-btn .s{font-size:12.5px;color:var(--ink-soft);margin-top:auto;display:flex;align-items:center;gap:5px}
  .theme-btn .s b{color:var(--ink);font-weight:700}

  /* GRADE cards */
  .theme-head{display:flex;align-items:flex-start;gap:13px;margin-bottom:16px}
  .theme-head .badge{
    width:46px;height:46px;border-radius:50%;border:2.5px solid var(--ink);flex:0 0 auto;
    display:grid;place-items:center;color:#fff;box-shadow:2px 3px 0 var(--ink);margin-top:2px;
  }
  .theme-head .badge svg{width:26px;height:26px}
  .theme-head h2{font-family:"Fredoka",sans-serif;font-weight:700;font-size:clamp(24px,4.2vw,34px);margin:0;line-height:1.05}
  .theme-head .meta{font-family:"Nunito Sans",sans-serif;font-size:13px;color:var(--ink-soft);margin-top:3px}
  .cards{display:flex;flex-direction:column;gap:13px}
  .card{
    border:2.5px solid var(--ink);border-radius:16px;background:#fff;padding:14px 15px 14px 17px;
    box-shadow:4px 5px 0 var(--ink);border-left-width:7px;border-left-color:var(--accent,var(--ink));
  }
  .card .ghd{display:flex;align-items:baseline;gap:9px;margin-bottom:11px;flex-wrap:wrap}
  .card .gr{
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:16px;background:#F07A1B;color:#fff;
    padding:1px 10px;border-radius:8px;line-height:1.35;white-space:nowrap;
  }
  .card .nm{font-family:"Fredoka",sans-serif;font-weight:600;font-size:clamp(15px,2.2vw,17px);line-height:1.15}
  .card .acts{display:flex;gap:10px;flex-wrap:wrap}
  .pill{
    cursor:pointer;font-family:"Fredoka",sans-serif;font-weight:600;font-size:14px;
    border:2.5px solid var(--ink);border-radius:11px;padding:8px 13px;background:#fff;color:var(--ink);
    display:inline-flex;align-items:center;gap:7px;box-shadow:3px 3px 0 var(--ink);
    transition:transform .1s,box-shadow .1s;
  }
  .pill:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
  .pill:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .pill svg{width:15px;height:15px}
  .pill.kit{background:#fff}
  .pill.video{background:#F07A1B;color:#fff}
  .pill.video svg{stroke:#fff}
  .pill.soon{opacity:.55}

  /* footer site link */
  .site-link{
    display:inline-flex;align-items:center;gap:7px;margin-top:22px;
    font-family:"Fredoka",sans-serif;font-weight:500;font-size:14px;
    color:var(--ink-soft);text-decoration:none;border-top:2px dashed rgba(28,27,26,.18);
    padding-top:14px;width:100%;transition:color .15s;
  }
  .site-link:hover{color:#F07A1B}

  /* toast */
  #toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 18px;border-radius:13px;font-weight:500;
    font-size:14.5px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:60;max-width:88vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:560px){
    .grid{grid-template-columns:1fr}
    .theme-btn:nth-child(odd),.theme-btn:nth-child(even){transform:none}
    body{background-position:right -120px center}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
  :focus-visible{outline:3px solid var(--c-zaman);outline-offset:3px;border-radius:6px}
</style>

const themeIcon = id => '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[id]||'')+'</svg>';

const css = getComputedStyle(document.documentElement);
const colorOf = v => css.getPropertyValue(v).trim();

/* ---- views ---- */
function show(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const el = document.getElementById('view-'+id);
  el.classList.add('active');
  // restart animation
  el.style.animation='none'; void el.offsetWidth; el.style.animation='';
  window.scrollTo({top:0,behavior:'instant' in document.body.style?'instant':'auto'});
}

/* ---- toast ---- */
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ---- kit PDF aç (data URI -> Blob, büyük PDF'ler için güvenli) ---- */
function openKit(data, name){
  try{
    if(data.startsWith('data:')){
      const [head, b64] = data.split(',');
      const mime = (head.match(/data:([^;]+)/)||[])[1] || 'application/pdf';
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      const url = URL.createObjectURL(new Blob([bytes],{type:mime}));
      const w = window.open(url,'_blank','noopener');
      if(!w) toast('Lütfen açılır pencerelere (pop-up) izin verin.');
      setTimeout(()=>URL.revokeObjectURL(url), 60000);
    } else {
      window.open(data,'_blank','noopener');
    }
  }catch(e){
    toast('“'+name+'” açılırken bir sorun oluştu.');
  }
}

/* ---- YouTube videosunu embed olarak aç ---- */
function openVideo(url, name){
  try{
    let videoId = null;
    const youtubeRegex = /(?:youtube.com\/watch\?v=|youtu.be\/)([^&?\s]+)/;
    const match = url.match(youtubeRegex);
    if(match) videoId = match[1];
    if(!videoId){ window.open(url,"_blank","noopener"); return; }
    const embedUrl = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    window.open(embedUrl,"_blank","noopener");
  }catch(e){ window.open(url,"_blank","noopener"); }
}

/* ---- build themes grid ---- */
const grid=document.getElementById('themes-grid');
DATA.forEach(theme=>{
  const b=document.createElement('button');
  b.className='theme-btn';
  b.innerHTML=
    '<span class="chip" style="background:'+colorOf(theme.varc)+'">'+themeIcon(theme.id)+'</span>'+
    '<span class="t">'+theme.title+'</span>'+
    '<span class="s"><b>4</b> sınıf · <b>4</b> etkinlik</span>';
  b.addEventListener('click',()=>openTheme(theme.id));
  grid.appendChild(b);
});

/* ---- theme detail ---- */
function openTheme(id){
  const theme=DATA.find(t=>t.id===id);
  const accent=colorOf(theme.varc);
  document.getElementById('detail-title').textContent=theme.title;
  document.getElementById('detail-meta').textContent='4 sınıf · 4 etkinlik';
  const badge=document.getElementById('detail-badge');
  badge.style.background=accent;
  badge.innerHTML=themeIcon(theme.id);
  const wrap=document.getElementById('detail-cards');
  wrap.style.setProperty('--accent',accent);
  wrap.innerHTML='';
  theme.grades.forEach(g=>{
    const card=document.createElement('div');
    card.className='card';
    const acts=document.createElement('div'); acts.className='acts';

    const kit=document.createElement('button');
    kit.className='pill kit'+(g.kit?'':' soon');
    kit.innerHTML=ICON_KIT+'Kit İçeriği';
    kit.addEventListener('click',()=>g.kit?openKit(g.kit,g.name)
      :toast('“'+g.name+'” kit içeriği yakında eklenecek.'));

    const vid=document.createElement('button');
    vid.className='pill video'+(g.video?'':' soon');
    vid.innerHTML=ICON_VID+'Video';
    vid.addEventListener('click',()=>g.video?openVideo(g.video,g.name)
      :toast('“'+g.name+'” videosu yakında eklenecek.'));

    acts.append(kit,vid);
    card.innerHTML='<div class="ghd"><span class="gr">'+g.grade+'</span><span class="nm">'+g.name+'</span></div>';
    card.appendChild(acts);
    wrap.appendChild(card);
  });
  show('detail');
}
